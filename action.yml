name: "Binclusive accessibility (CI gate)"
description: "Run the Binclusive accessibility engine on changed files, gate the PR, emit SARIF, and (with a token) phone findings home to the dashboard."
author: "Binclusive"
inputs:
  base:
    description: "Git ref to diff against (e.g. the PR base). Empty scans the whole checkout."
    required: false
    default: ""
  fail-on:
    description: "block|warn — the enforcement level that fails the build. Default block."
    required: false
    default: "block"
  # Phone-home surface (all OPTIONAL, local-first): the `ci` command uploads findings to the
  # dashboard ONLY when `binclusive-api-key` is set. Absent key → the scan stays fully local (stdout +
  # SARIF), exit 0 — never an error. The CLI reads these off `BINCLUSIVE_*` env directly; the Docker
  # runner passes this action's `env:` block into the container, so they reach the CLI unchanged.
  # `binclusive-org-id` is DELIBERATELY absent: org is derived server-side from the key's own membership
  # (ADR 0038); re-adding it re-opens the #2100/#2160 confused-deputy surface.
  binclusive-api-key:
    description: >
      OPTIONAL. A Binclusive `b8e_` apiKey (the ingestion bearer). Present → the run phones its
      findings home to the dashboard; absent → fully local, exit 0 (never an error). Mint it in the
      dashboard and store it as a repo secret. NOT an LLM key.
    required: false
    default: ""
  binclusive-project-id:
    description: >
      OPTIONAL. The Binclusive project id the findings belong to. Required alongside `binclusive-api-key`
      for phone-home — it selects WHICH project and cannot be derived from the key (one key spans
      many projects). Absent (with a key set) is a loud error from the CLI.
    required: false
    default: ""
  binclusive-api-url:
    description: >
      OPTIONAL. Override the Kontrol GraphQL endpoint the findings are sent to (default
      https://kontrol.binclusive.io/graphql). For staging / self-host only. The ONE endpoint var.
    required: false
    default: ""
  # Branded bot identity (all OPTIONAL, local-first): with the id + private key set, the `ci`
  # command mints a short-lived binclusive[bot] installation token so phone-home writes are
  # attributed to the branded App instead of the default workflow bot. Any one blank → the run
  # silently falls back to the workflow token, never an error. The CLI reads these off
  # `BINCLUSIVE_APP_*` env directly (same pattern as `B8E_*`); the Docker runner passes this
  # action's `env:` block into the container, so they reach the CLI unchanged.
  binclusive-app-id:
    description: >
      OPTIONAL. The Binclusive GitHub App id. Present alongside the private key → phone-home writes
      are attributed to the branded binclusive[bot]; absent → the default workflow bot. Store as a
      repo secret.
    required: false
    default: ""
  binclusive-app-private-key:
    description: >
      OPTIONAL. The Binclusive GitHub App private key (PEM). SECRET MATERIAL — store as a repo
      secret; never log or echo it. Required alongside `binclusive-app-id` to mint the branded
      token; absent → the default workflow bot.
    required: false
    default: ""
  binclusive-app-installation-id:
    description: >
      OPTIONAL. The App installation id for this repo. Usually unnecessary — when absent it is
      discovered from the repo, so you only install the App, never look up its id.
    required: false
    default: ""
outputs:
  sarif-file:
    description: "Path to the SARIF file; feed to github/codeql-action/upload-sarif (needs security-events: write)."
runs:
  using: "docker"
  # Moving major tag — tracks the latest v0 image; no exact pin (release-please deferred, monorepo#2553).
  image: "docker://ghcr.io/binclusive/binclusive:0"
  # Event router (a11y#342, companion to monorepo#3450 / ADR 0006). The image's baked entrypoint
  # (`/usr/local/bin/binclusive-ci`) always runs the scan+gate (`binclusive ci`). We override it
  # with a tiny sh shim that inspects the triggering event:
  #   • `pull_request` with `action: closed`  → `binclusive ci close` — NO scan. A PR-close carries
  #     no findings; it only POSTs the resolved PR ref home so the dashboard retires that PR's
  #     ephemeral findings (Sentry-style manual resolve). This is the CI-lane delivery half of
  #     monorepo#3450: only the customer's own CI sees their PR close (a Binclusive-hosted webhook
  #     never sees a customer repo — ADR 0006), so the Action is the signal's only carrier.
  #   • every other event → `exec` the baked scan entrypoint UNCHANGED (zero duplicated logic).
  # Thin wrapper: the CLI owns both halves; this only routes. The close branch reads the event
  # from GITHUB_EVENT_PATH — the SAME payload the CLI's `resolveCiPrRef` reads for repo + PR
  # number + head SHA — so router and CLI agree on what "a close" is. The BINCLUSIVE_* env below
  # and the runner-injected GITHUB_* (GITHUB_REPOSITORY / GITHUB_EVENT_PATH / GITHUB_EVENT_NAME)
  # reach both paths, so `ci close` gets the same credentials + PR context the scan path does.
  entrypoint: "/bin/sh"
  args:
    - "-c"
    - |
      if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ] && node -e 'const fs=require("fs");process.exit(JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,"utf8")).action==="closed"?0:1)' 2>/dev/null; then
        exec node /app/dist/bin.js ci close
      fi
      exec /usr/local/bin/binclusive-ci
  env:
    # Scope + gate: the image entrypoint marshals these INPUT_* vars into `binclusive ci` flags
    # (INPUT_BASE → --base, INPUT_FAIL_ON → --fail-on).
    INPUT_BASE: ${{ inputs.base }}
    INPUT_FAIL_ON: ${{ inputs.fail-on }}
    # Phone-home: the `ci` command reads these off process.env directly (no entrypoint marshalling).
    # CLI 0.6.0 reads BINCLUSIVE_* only; `binclusive-api-url` maps to BINCLUSIVE_API_URL — the CLI's
    # single endpoint var (supersedes the old per-ingest ingest URL).
    BINCLUSIVE_API_KEY: ${{ inputs.binclusive-api-key }}
    BINCLUSIVE_PROJECT_ID: ${{ inputs.binclusive-project-id }}
    BINCLUSIVE_API_URL: ${{ inputs.binclusive-api-url }}
    # Branded bot identity: read off process.env directly (like B8E_*) to mint a short-lived
    # binclusive[bot] token (monorepo#2854); any blank → default workflow bot. Private key is
    # secret material — never logged.
    BINCLUSIVE_APP_ID: ${{ inputs.binclusive-app-id }}
    BINCLUSIVE_APP_PRIVATE_KEY: ${{ inputs.binclusive-app-private-key }}
    BINCLUSIVE_APP_INSTALLATION_ID: ${{ inputs.binclusive-app-installation-id }}
