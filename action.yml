name: "Binclusive a11y-checker (tracer bullet)"
description: "Scan changed .tsx files with the Binclusive accessibility engine and comment on the PR. Static path, non-blocking."
author: "Binclusive"

inputs:
  github-token:
    description: "Token used to post inline review comments on the PR."
    required: true
    default: ${{ github.token }}

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    GITHUB_REPOSITORY: ${{ github.repository }}
    GITHUB_API_URL: ${{ github.api_url }}
    PR_NUMBER: ${{ github.event.pull_request.number }}
    BASE_SHA: ${{ github.event.pull_request.base.sha }}
    HEAD_SHA: ${{ github.event.pull_request.head.sha }}
