name: "Binclusive accessibility (CI gate)"
description: "Run the Binclusive accessibility engine on changed files, gate the PR, emit SARIF."
author: "Binclusive"
inputs:
  base:
    description: "Git ref to diff against (e.g. the PR base). Empty scans the whole checkout."
    required: false
    default: ""
  fail-on:
    description: "block|warn — the enforcement level that fails the build. Default block."
    required: false
    default: "block"
outputs:
  sarif-file:
    description: "Path to the SARIF file; feed to github/codeql-action/upload-sarif (needs security-events: write)."
runs:
  using: "docker"
  # Moving major tag — tracks the latest v0 image; no exact pin (release-please deferred, monorepo#2553).
  image: "docker://ghcr.io/binclusive/binclusive:0"
  env:
    INPUT_BASE: ${{ inputs.base }}
    INPUT_FAIL_ON: ${{ inputs.fail-on }}
