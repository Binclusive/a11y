# The a11y-checker workflow with every optional lane wired in. Start from
# examples/github-actions/a11y.yml; add only the lanes you want. Each `with:`
# input below is OPTIONAL and independent — absent means "lane off", never an
# error, and the deterministic floor still runs.
name: a11y
on: pull_request

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — the a11y diff scan needs base history; a shallow clone finds 0 changed files (a11y#198)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: a11y
        uses: Binclusive/a11y@v0.1.1
        with:
          # --- AI enrichment lane (BYOK) ---------------------------------------
          # Your OWN provider key, from a repo secret. Provider-agnostic; no
          # provider is baked into the Action. Absent → AI lane skipped, floor
          # still runs. Your credential never leaves the runner for the dashboard.
          llm-api-key:  ${{ secrets.LLM_API_KEY }}
          llm-provider: anthropic                    # default: anthropic (openai also shipped)
          llm-model:    claude-haiku-4-5-20251001    # default model; override to taste

          # --- Blocking gate (default off) ------------------------------------
          # Set either to FAIL the check (non-zero) on threshold. Both stay
          # advisory (exit 0) when unset. Comments + SARIF still post either way.
          # fail-on: critical        # fail on any finding at/above this severity
          # max-violations: 0        # fail when total finding count exceeds N

          # --- Branded PR comments (default off) ------------------------------
          # Install the Binclusive GitHub App and post comments under its
          # identity instead of github-actions[bot]. Pure identity swap; falls
          # back to github-token (and still exits 0) if unset or a mint fails.
          # binclusive-app-id:          ${{ vars.BINCLUSIVE_APP_ID }}
          # binclusive-app-private-key: ${{ secrets.BINCLUSIVE_APP_PRIVATE_KEY }}

          # --- Phone-home to the Binclusive dashboard (default off) -----------
          # Metadata-only ingestion. Mint b8e-token in the dashboard. Absent →
          # scan stays fully local. Unrelated to llm-api-key.
          # b8e-token:      ${{ secrets.B8E_TOKEN }}
          # b8e-org-id:     your-org-id
          # b8e-project-id: your-project-id
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.a11y.outputs.sarif-file }}
