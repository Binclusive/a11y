# The minimal a11y-checker workflow — copy this into your repo as
# .github/workflows/a11y.yml, open a PR, and findings appear on it.
#
# What runs: the deterministic floor. On every PR it scans the changed .tsx
# files, posts inline review comments + one rollup comment, and writes a SARIF
# file that renders as native code-scanning annotations on the diff. No account,
# no secret, no config required. Advisory by default — the check always exits 0
# and never blocks a merge.
name: a11y
on: pull_request

permissions:
  contents: read
  pull-requests: write   # inline review comments + rollup comment
  security-events: write # upload SARIF as code-scanning annotations

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — the a11y diff scan needs base history; a shallow clone finds 0 changed files (a11y#198)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: a11y
        uses: Binclusive/a11y@v0.1.2 # x-release-please-version
      - if: always() # advisory gate exits 0; upload regardless of findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.a11y.outputs.sarif-file }}
