# a11y-checker on CircleCI — ready-made config.
# Real location in your repo: .circleci/config.yml
#
# Runs the published Binclusive engine image over the .tsx files changed vs the
# default branch. CircleCI has NO base-branch variable, so we DERIVE the base.
#
# Image: ghcr.io/binclusive/a11y:<version>  (static / no-browser variant).
#   Bump the tag to upgrade. For a live-URL scan (set INPUT_SCAN_URL) swap to the
#   browser variant ghcr.io/binclusive/a11y:browser-<version> (legacy :<version>-browser still published).
#
# Canon: .patterns/ci-runners/{run-docker-image,ci-context,checkout-depth,secrets-and-env,exit-codes}.md

version: 2.1

jobs:
  a11y:
    # run-docker-image.md: the `docker:` executor runs the steps inside the first
    # image.
    docker:
      - image: ghcr.io/binclusive/a11y:0.1.3 # x-release-please-version
    environment:
      A11Y_DEFAULT_BRANCH: main
    steps:
      - checkout
      - run:
          name: a11y-checker (changed .tsx)
          command: |
            # exit-codes.md: CircleCI runs each step under `bash -eo pipefail`, so
            # a non-zero container exit fails the step (and the build) — that is how
            # the opt-in gate blocks. Default is advisory (exit 0). Soft-fail escape:
            # prepend `set +e` and end this command with an explicit `exit 0`.
            #
            # ci-context.md: CircleCI exposes NO base-branch var — derive it by
            # fetching the default branch. checkout-depth.md: `checkout` is a FULL
            # branch clone (no shallow default to fight), but the OTHER branch (the
            # base) is still absent until fetched.
            git fetch --no-tags origin "$A11Y_DEFAULT_BRANCH"
            export GITHUB_WORKSPACE="$(pwd)"
            export BASE_SHA="origin/$A11Y_DEFAULT_BRANCH"
            export HEAD_SHA="$CIRCLE_SHA1"
            # Opt-in blocking gate (default OFF = advisory). Uncomment ONE:
            # export FAIL_ON=serious        # fail when any finding is >= this impact
            # export MAX_VIOLATIONS=0       # fail when total finding count exceeds N
            /engine/entrypoint.sh

workflows:
  build:
    jobs:
      # Bare string job reference (not `- a11y:` with a null mapping) — the only
      # keys we'd add are commented out, and a mapping with no live value misparses.
      - a11y
          # secrets-and-env.md: optional phone-home. Create a Context (Org
          # Settings -> Contexts) holding B8E_TOKEN (masked) and attach it here;
          # a context var only reaches a job whose workflow entry names it. Omit
          # for a fully-local scan.
          # context: binclusive-a11y
