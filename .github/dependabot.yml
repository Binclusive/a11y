version: 2

# Keep the SHA-pinned third-party GitHub Actions across all workflows fresh.
# Pinning to a commit SHA closes the moving-tag injection vector, but a frozen
# pin rots; Dependabot opens a weekly PR bumping each pin to the newest release's
# SHA (comment updated too), so security fixes land without hand-tracking them.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
