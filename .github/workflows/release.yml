name: Release a11y engine

# Publishes @binclusive/a11y to the public npm registry. No manual steps: bump
# package.json's version in a PR, merge to main, and this workflow publishes the
# new version automatically.
#
# Idempotent: every push to main touching the manifest runs the job, but it only
#   publishes when the version isn't already on npm — so a push that doesn't bump
#   the version is a no-op instead of a failed re-publish.
# Auth: npm Trusted Publishing (OIDC) — CI holds no token. The package's
#   "Trusted Publisher" must be configured on npmjs.com (GitHub Actions →
#   Binclusive / a11y-checker-plugin / release.yml / npm publish).
# Ships source: the package has no build step — `files` ships bin/ + src/ +
#   data/baseline-rules.json and runs via tsx at runtime, so there is nothing to
#   compile before packing.
# Provenance: disabled explicitly so nothing about this repo becomes a public
#   attestation before the repo itself is public.

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .github/workflows/release.yml

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

concurrency:
  group: release-a11y-engine
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are SHA-pinned (a moving tag is a code-injection
      # vector); Dependabot (.github/dependabot.yml) bumps the pins weekly.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9 # packageManager is unset; lockfile is v9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Is this version already published?
        id: check
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          # npm view exits non-zero when the package has no published versions yet;
          # under Actions' `set -eo pipefail` shell that aborts the step, so fall
          # back to `[]` (unpublished → proceed to publish).
          ALREADY="$( (npm view @binclusive/a11y versions --json 2>/dev/null || echo '[]') \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{let a;try{a=JSON.parse(s)}catch{a=[]};if(!Array.isArray(a))a=[a];console.log(a.includes(process.argv[1])?'yes':'no')})" "$PKG_VERSION")"
          if [ "$ALREADY" = "yes" ]; then
            echo "@binclusive/a11y@$PKG_VERSION is already on npm — nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "@binclusive/a11y@$PKG_VERSION is new — publishing."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.publish == 'true'
        # pnpm pack produces the tarball; npm publish of that tarball preserves npm
        # Trusted Publishing (OIDC). pnpm publish would skip the OIDC handshake and
        # fail auth (no token in env). publishConfig.access=public is honored.
        run: |
          TARBALL="$(pnpm pack | tail -1)"
          npm publish "$TARBALL"
        env:
          NPM_CONFIG_PROVENANCE: "false"
