# Automates the version bump (issue #203): reads conventional-commit history and
# maintains a single open "release PR" that bumps package.json + the annotated
# image pins and pre-writes the CHANGELOG. Merging that PR is the release — it
# creates the `v<version>` tag + GitHub Release, which the EXISTING publish
# workflows key off, unchanged:
#   - release.yml       (npm publish, triggered by the package.json change)
#   - release-image.yml (GHCR image build; its release job sees the Release this
#                        action already cut and no-ops its own `gh release create`)
# So this workflow only PROPOSES and TAGS; it never publishes. It does not
# duplicate the two workflows above.
#
# Scope note (#203): release-please re-pins the files it can update in place via
# the `x-release-please-version` annotation — action.yml and README.md (see
# release-please-config.json). action-url/action.yml is NOT auto-repinned here:
# its pin is `:<version>-browser`, and release-please's generic updater parses the
# `-browser` as a semver pre-release and DROPS it on replace (0.1.2-browser ->
# 0.1.3), which would silently repoint the browser action at the static image.
# That manifest stays covered by the fail-loud `scripts/check-action-pin.mjs`
# drift gate (the backstop #203 keeps), which reds CI if its version lags the bump.
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write # create the release PR branch, the v<version> tag + Release
  pull-requests: write # open/update the release PR

jobs:
  release-please:
    name: Maintain the release PR
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are SHA-pinned (a moving tag is a code-injection
      # vector); Dependabot (.github/dependabot.yml) bumps the pin. Comment tag: v4.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
