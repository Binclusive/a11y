name: checks

# Repo-level guard scripts that must stay green on every push / PR. The
# action-pin gate (issue #2109) is the load-bearing one: it fails a PR that
# bumps package.json's version without re-pinning action.yml's image tag, so the
# published-image / served-Action version drift is unrepresentable rather than
# a thing we hope stays synced.
on:
  push:
    paths:
      - package.json
      - action.yml
      - scripts/check-action-pin.mjs
      - .github/workflows/checks.yml
  pull_request:
    paths:
      - package.json
      - action.yml
      - scripts/check-action-pin.mjs
      - .github/workflows/checks.yml

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-pin:
    name: action.yml image pin matches package.json
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are SHA-pinned; Dependabot bumps the pins weekly.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      # Plain node, no deps to install — the script only reads package.json +
      # action.yml, so a bare checkout is all it needs.
      - run: node ./scripts/check-action-pin.mjs
