name: Release a11y engine image

# Builds the @binclusive/a11y engine image(s) and publishes to GHCR, plus cuts a
# tagged GitHub Release. Companion to release.yml (npm): the same trigger, the
# same "bump package.json → merge to main" gesture, so one version bump produces
# the npm package, the GHCR image, and a `v<version>` Release.
#
# Idempotent: every push to main touching the manifest runs the job, but each
#   artifact is guarded by its own "already exists?" probe — the image against
#   GHCR, the tag/Release against the repo. A push that doesn't bump the version
#   (or a re-run) is a no-op instead of a failed re-publish, exactly like npm.
# Auth: the built-in GITHUB_TOKEN (no PAT) — `packages: write` lets it push to
#   GHCR, `contents: write` lets it create the tag + Release. GHCR trusts this
#   repo-scoped token for `ghcr.io/binclusive/*`, so no secret lives in the repo.
# Corpus-free: the private corpus left the engine (ADR 0041 §G); the image COPYs
#   only the engine sources the .dockerignore lets through (no corpus/moat path),
#   so the published artifact carries no private data — the AC that release
#   artifacts exclude the corpus holds by construction.
# Supply-chain: every third-party action is pinned to a full commit SHA (a moving
#   tag is a code-injection vector); Dependabot (.github/dependabot.yml) bumps
#   the pins weekly.

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - Dockerfile
      - .github/workflows/release-image.yml

permissions:
  contents: write # create the v<version> git tag + GitHub Release
  packages: write # push the image to GHCR

concurrency:
  group: release-a11y-engine-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/binclusive/a11y

jobs:
  # One row per image variant. `suffix` carries its OWN leading dash so the empty
  # static case degrades cleanly (":<version>" / ":latest") while a variant reads
  # ":<version>-<x>" / ":latest-<x>". Adding the Phase-7 browser image is a
  # one-line row — { name: browser, dockerfile: Dockerfile.browser, suffix: "-browser" }
  # — and nothing below changes.
  images:
    name: Publish image (${{ matrix.variant.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: static, dockerfile: Dockerfile, suffix: "" }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Read the package version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # GHCR trusts the built-in token for images under this repo's org; no PAT.
      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Is this image variant+version already in GHCR?
        id: check
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ matrix.variant.suffix }}
        run: |
          # `docker manifest inspect` exits non-zero when the tag isn't in the
          # registry — that (not an error) is the "publish" signal. Any other
          # failure mode also falls through to publish, which is safe: the push
          # step is itself idempotent (re-pushing an identical digest is a no-op).
          if docker manifest inspect "$IMAGE:${VERSION}${SUFFIX}" >/dev/null 2>&1; then
            echo "$IMAGE:${VERSION}${SUFFIX} already in GHCR — nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$IMAGE:${VERSION}${SUFFIX} is new — publishing."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        if: steps.check.outputs.publish == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Tag both :<version>[-suffix] (immutable, what action.yml pins) and
      # :latest[-suffix] (the floating convenience tag). The .dockerignore already
      # excludes .git, docs, experiments, and node_modules from the build context —
      # the corpus is not in the tree at all, so nothing private can reach a layer.
      - name: Build and push
        if: steps.check.outputs.publish == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.IMAGE }}:latest${{ matrix.variant.suffix }}

  # Cut the tag + Release ONCE, after every image variant is published. Guarded
  # independently of the image probes so a partial prior run (images pushed,
  # Release not) self-heals on the next push.
  release:
    name: Create the git tag + GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Read the package version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create the git tag + GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to cut."
            exit 0
          fi
          # `gh release create` creates the annotated tag at the current SHA and
          # the Release in one call; --generate-notes fills the body from commits.
          # Immutability (a Release whose tag/assets cannot be altered after
          # publish) is NOT a gh-CLI flag in this runner's version — it is a repo
          # setting ("Immutable releases" under Settings → General). Enable it
          # there so a cut Release is tamper-evident. (--verify-tag is the inverse:
          # it aborts when the tag is ABSENT, which would break tag creation here.)
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"
