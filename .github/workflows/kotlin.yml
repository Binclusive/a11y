name: kotlin

# Gives the Compose collector (A11yKotlinScan) the same pre-finish guard the Swift
# path has: build + run `./gradlew test` on every push / PR that touches the
# package. A regression in the PSI scan (a missing-contentDescription misfire, a
# false positive on a labeled Image/Icon) fails here instead of shipping silently.
on:
  push:
    paths:
      - "kotlin/A11yKotlinScan/**"
      - ".github/workflows/kotlin.yml"
  pull_request:
    paths:
      - "kotlin/A11yKotlinScan/**"
      - ".github/workflows/kotlin.yml"

# A newer push to the same ref cancels the in-flight run for it.
concurrency:
  group: kotlin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 21 is the engine's jvmTarget and a stable JVM for Gradle 9.6.1 + the
      # Kotlin 2.3.21 plugin (see build.gradle.kts for the pinned version matrix).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The committed Gradle wrapper pins Gradle 9.6.1, so CI is reproducible.
      - name: gradle test
        working-directory: kotlin/A11yKotlinScan
        run: ./gradlew test --no-daemon
