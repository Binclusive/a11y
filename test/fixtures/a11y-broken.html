<!--
  A deterministic, fully self-contained accessibility-broken page used by the
  rendered-DOM e2e test (test/collect-dom.e2e.test.ts). Every violation below is
  a static-DOM rule that axe-core resolves WITHOUT layout, computed contrast, or
  network — so it fires identically offline via file:// in headless Chromium,
  across axe versions, with no flakiness.

  Intentional violations (rule id → WCAG SC):
    - <img> with no alt          → image-alt   (1.1.1)
    - <input> with no label/name → label       (a label/name rule)
    - <a href> with no text/name → link-name   (2.4.4 / 4.1.2)
    - <button> with no text/name → button-name (4.1.2)
    - missing lang on <html>     → html-has-lang (3.1.1)

  Deliberately NOT included in the asserted set: color-contrast (needs real
  layout + computed color and is not stable enough to hard-assert here).
-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>a11y-broken fixture</title>
  </head>
  <body>
    <main>
      <h1>Deterministic accessibility violations</h1>

      <!-- image-alt / 1.1.1: image with no alt attribute at all -->
      <img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" />

      <!-- label: form input with no associated label and no accessible name -->
      <form>
        <input type="text" name="q" />
      </form>

      <!-- link-name / 2.4.4: anchor with href but no discernible text -->
      <a href="https://example.com"
        ><img
          src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
      /></a>

      <!-- button-name / 4.1.2: button with no discernible text -->
      <button type="button"></button>
    </main>
  </body>
</html>
