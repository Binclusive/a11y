name: "Binclusive accessibility (URL scan)"
description: "Render a live URL in real Chromium, run the Binclusive/axe engine over the DOM, emit SARIF."
author: "Binclusive"
# The URL counterpart to the root static action (../action.yml). Same thin-shell shape — a docker://
# action over the monorepo GHCR image — but the BROWSER variant (:0-browser), which ships Playwright
# + Chromium so `binclusive scan --url` can render a live page (engine decision 0001). KEEP-SPLIT
# from the static image (monorepo#290): a separate tag, so this heavy variant is an explicit opt-in.
# Same R2/R3 discipline as the static action: NO github-token, NO llm-api-key — the deterministic
# free lane needs neither.
inputs:
  url:
    description: "The URL to render and scan (e.g. https://example.com)."
    required: true
  timeout-ms:
    description: "Max ms to wait for navigation + the page load event. Engine default 30000."
    required: false
    default: ""
  # Branded bot identity (all OPTIONAL, local-first) — see ../action.yml for the full why. With the
  # id + private key set the CLI mints a short-lived binclusive[bot] token (monorepo#2854); any one
  # blank → the default workflow bot, never an error.
  binclusive-app-id:
    description: >
      OPTIONAL. The Binclusive GitHub App id. Present alongside the private key → writes are
      attributed to the branded binclusive[bot]; absent → the default workflow bot. Store as a repo
      secret.
    required: false
    default: ""
  binclusive-app-private-key:
    description: >
      OPTIONAL. The Binclusive GitHub App private key (PEM). SECRET MATERIAL — store as a repo
      secret; never log or echo it. Required alongside `binclusive-app-id` to mint the branded
      token; absent → the default workflow bot.
    required: false
    default: ""
  binclusive-app-installation-id:
    description: >
      OPTIONAL. The App installation id for this repo. Usually unnecessary — when absent it is
      discovered from the repo, so you only install the App, never look up its id.
    required: false
    default: ""
outputs:
  sarif-file:
    description: "Absolute path to the SARIF file; feed to github/codeql-action/upload-sarif (needs security-events: write)."
runs:
  using: "docker"
  # Moving major browser tag — tracks the latest v0 browser image; no exact pin (release-please deferred, monorepo#2553).
  image: "docker://ghcr.io/binclusive/binclusive:0-browser"
  env:
    INPUT_URL: ${{ inputs.url }}
    INPUT_TIMEOUT_MS: ${{ inputs.timeout-ms }}
    # Branded bot identity: read off process.env directly to mint a short-lived binclusive[bot]
    # token (monorepo#2854); any blank → default workflow bot. Private key is secret — never logged.
    BINCLUSIVE_APP_ID: ${{ inputs.binclusive-app-id }}
    BINCLUSIVE_APP_PRIVATE_KEY: ${{ inputs.binclusive-app-private-key }}
    BINCLUSIVE_APP_INSTALLATION_ID: ${{ inputs.binclusive-app-installation-id }}
