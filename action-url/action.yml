name: "Binclusive a11y-checker (URL scan)"
description: "Render a live URL with a real browser and run axe-core (non-React / source-less pages). Opt-in browser variant — pulls Chromium; the static action.yml never does."
author: "Binclusive"

# The opt-in, browser-capable sibling of action.yml (#2336). A Docker action's
# `runs.image` is fixed per manifest, so the browser lane cannot be a runtime flag
# on the static action — it is a SEPARATE action pinned to the `-browser` image.
# The static action stays lean and never pulls Chromium; a consumer opts into the
# URL scan by referencing THIS action (`Binclusive/a11y/action-url@v<version>`)
# and passing `scan-url`. It lives in the `action-url/` subdirectory because
# `uses: owner/repo/<dir>@ref` resolves `<dir>/action.yml`; a second action cannot
# live under a custom root filename (see .patterns/github-actions/uses-resolution.md).

inputs:
  scan-url:
    description: >
      The live URL (or `file://` URL / local path) to render and scan with
      axe-core. This is the load-bearing input — set it to run the browser scan.
      Empty → nothing to scan.
    required: false
    default: ""
  github-token:
    description: "Token used to post the run summary / any PR comments. Defaults to the workflow token."
    required: false
    default: ${{ github.token }}

runs:
  using: "docker"
  # Pinned to the pre-published browser image (release-image.yml's `browser` matrix
  # row pushes :<version>-browser on every version bump), NOT a local build — same
  # fast-pull rationale as action.yml (#2133). The VERSION portion tracks
  # package.json in lockstep (the action-pin drift gate enforces it, tolerating the
  # `-browser` suffix); a consumer at ref v<version> resolves this exact digest.
  #
  # NO `x-release-please-version` annotation here (unlike action.yml): release-please's
  # generic updater reads `-browser` as a semver pre-release and drops it on replace
  # (`0.1.2-browser` -> `0.1.3`), silently repointing this action at the STATIC image.
  # The `:<version>-browser` tag is also a public interface (examples/ci/*), so it
  # can't be reshaped into a release-please-parseable form. This pin is repinned by
  # hand and enforced by the fail-loud scripts/check-action-pin.mjs drift gate.
  image: "docker://ghcr.io/binclusive/a11y:0.1.2-browser"
  # A Docker action auto-injects each input as INPUT_<NAME> — the entrypoint reads
  # INPUT_SCAN_URL to branch into `check-url`. The token is the one value the runner
  # does not pass by default, so map it explicitly like the static action.
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
